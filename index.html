<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="panel">
    <h3>Drop Objects</h3>
    <div class="row">
      <button id="drop-sphere">Drop Ball</button>
      <button id="drop-box">Drop Box</button>
      <button id="drop-cylinder">Cylinder</button>
      <button id="drop-cone">Cone</button>
      <button id="drop-pyramid">Pyramid</button>
      <button id="clear">Clear</button>
    </div>

    <h3>Physics</h3>
    <div class="control">
      <label>Gravity</label>
      <input id="gravity" type="range" min="0" max="40" value="20" step="1" />
      <span id="gravity-v">20</span>
    </div>
    <div class="control">
      <label>Friction</label>
      <input id="friction" type="range" min="0" max="1" value="0.4" step="0.05" />
      <span id="friction-v">0.40</span>
    </div>
    <div class="control">
      <label>Bounce</label>
      <input id="bounce" type="range" min="0" max="1" value="0.5" step="0.05" />
      <span id="bounce-v">0.50</span>
    </div>

    <h3>Stats</h3>
    <div class="control"><label>Objects</label><span id="stat-objects">0</span></div>
    <div class="control"><label>FPS</label><span id="stat-fps">0</span></div>

    <h3>Audio</h3>
    <div class="row">
      <label style="color:#d7e3ff; font-size:13px; display:flex; gap:6px; align-items:center;">
        <input id="sound-on" type="checkbox" checked /> Enable Sound
      </label>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
