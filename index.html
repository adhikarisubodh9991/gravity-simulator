<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, orientation=landscape">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gravity Simulator">
    <meta name="theme-color" content="#0a0a15">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="fullscreen" content="yes">
    <title>Gravity Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui-panel" id="control-tray">
        <div class="ui-header">
            <h1>Gravity Simulator</h1>
            <p class="ui-subtitle">Interactive gravity sandbox</p>
        </div>

        <section class="ui-section">
            <h2 class="ui-section-title">Drop Objects</h2>
            <div class="button-grid">
                <button id="btn-drop-sphere" class="btn btn-primary">⚪ Ball</button>
                <button id="btn-drop-box" class="btn btn-primary">📦 Box</button>
                <button id="btn-drop-cylinder" class="btn btn-primary">🔷 Cylinder</button>
                <button id="btn-drop-cone" class="btn btn-primary">📍 Cone</button>
                <button id="btn-drop-pyramid" class="btn btn-primary">🔺 Pyramid</button>
                <button id="btn-drop-capsule" class="btn btn-primary">💊 Capsule</button>
                <button id="btn-drop-torus" class="btn btn-primary">⭕ Torus</button>
                <button id="btn-drop-icosahedron" class="btn btn-primary">✦ Icosahedron</button>
            </div>
            
            <div class="control-group">
                <label class="control-label">Object Mass (kg)</label>
                <input type="number" id="input-mass" min="0.1" max="1000" value="10" step="0.5" class="number-input">
            </div>

            <div class="control-group">
                <label class="control-label">Object Size (0.5x - 3x)</label>
                <input type="number" id="input-size" min="0.5" max="3" value="1" step="0.1" class="number-input">
            </div>

            <div class="control-group">
                <label class="control-label">Drop Height</label>
                <input type="number" id="input-drop-height" min="10" max="500" value="60" step="5" class="number-input">
            </div>

            <div class="control-group" id="selected-object-info" style="display:none; margin-top: 12px; padding: 10px; background: rgba(0,212,255,0.2); border-radius: 6px; border-left: 3px solid #00d4ff;">
                <p id="selected-object-text" style="margin: 0; font-size: 0.9rem; color: #00d4ff;">Object selected</p>
            </div>
        </section>

        <section class="ui-section">
            <h2 class="ui-section-title">Physics</h2>
            
            <div class="control-group">
                <label class="control-label">Gravity (m/s²)</label>
                <input type="number" id="input-gravity" min="0" max="100" value="20" step="0.5" class="number-input">
            </div>

            <div class="control-group">
                <label class="control-label">Friction (0-1)</label>
                <input type="number" id="input-friction" min="0" max="1" value="0.4" step="0.05" class="number-input">
            </div>

            <div class="control-group">
                <label class="control-label">Restitution/Bounce (0-1)</label>
                <input type="number" id="input-restitution" min="0" max="1" value="0.5" step="0.05" class="number-input">
            </div>
        </section>

        <section class="ui-section">
            <h2 class="ui-section-title">Environment</h2>
            
            <div class="control-group">
                <label class="control-label">Ground Width</label>
                <input type="number" id="input-ground-width" min="200" max="1000" value="200" step="50" class="number-input">
            </div>

            <div class="control-group">
                <label class="control-label">Ground Height</label>
                <input type="number" id="input-ground-height" min="200" max="1000" value="200" step="50" class="number-input">
            </div>

            <div class="control-group">
                <label class="control-label">Void Threshold</label>
                <input type="number" id="input-void-threshold" min="-500" max="500" value="-300" step="10" class="number-input">
            </div>
        </section>

        <section class="ui-section">
            <h2 class="ui-section-title">Scene</h2>
            <div class="button-grid">
                <button id="btn-play-pause" class="btn btn-secondary">⏸ Pause</button>
                <button id="btn-slow-motion" class="btn btn-secondary">🐢 Slow-Mo</button>
            </div>
            <button id="btn-fullscreen" class="btn btn-secondary" style="width: 100%; margin-top: 8px;">📱 Enter Fullscreen</button>
            <small id="fullscreen-status" style="display:block; opacity:0.8; margin-top:6px;">Fullscreen: off</small>
            
            <div class="control-group">
                <label class="control-label">Nuke Power (50-1000)</label>
                <input type="number" id="input-nuke-power" min="50" max="1000" value="500" step="50" class="number-input">
            </div>
            
            <button id="btn-drop-nuke" class="btn btn-accent" style="width: 100%; margin-top: 8px;">☢ Drop Nuke</button>
            <button id="btn-toggle-destroy" class="btn btn-secondary" style="width: 100%; margin-top: 8px;">💥 Destruction Mode</button>
            <button id="btn-clear-all" class="btn btn-secondary" style="width: 100%; margin-top: 8px;">🗑 Clear All</button>
        </section>

        <section class="ui-section">
            <h2 class="ui-section-title">Audio</h2>
            <label class="checkbox-label">
                <input type="checkbox" id="toggle-sound" checked>
                <span>Enable Sound Effects</span>
            </label>
        </section>

        <section class="ui-section">
            <h2 class="ui-section-title">Stats</h2>
            <div class="stats-box">
                <div class="stat-row">
                    <span class="stat-label">Objects:</span>
                    <span class="stat-value" id="stat-object-count">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">FPS:</span>
                    <span class="stat-value" id="stat-fps">60</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Active Bodies:</span>
                    <span class="stat-value" id="stat-bodies">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Physics Time:</span>
                    <span class="stat-value" id="stat-physics-time">0</span> ms
                </div>
            </div>
        </section>
    </div>

    <button id="btn-toggle-ui" class="tray-handle" aria-expanded="true" aria-label="Toggle controls">❮</button>



    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Mobile fullscreen setup -->
    <script>
        // Check if we're on a mobile device
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(navigator.userAgent);
        };

        const isFileProtocol = window.location.protocol === 'file:';

        // Try to lock the screen in landscape mode to prevent accidental rotation
        const lockLandscapeOrientation = () => {
            if (isFileProtocol) return;
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape-primary').catch((err) => {
                    // Some devices don't support orientation lock, that's okay
                });
            }
        };

        // Request fullscreen for the entire page
        const goFullscreen = async () => {
            if (isFileProtocol) return;
            const elem = document.documentElement;
            
            try {
                // Try the standard fullscreen API first
                if (elem.requestFullscreen) {
                    await elem.requestFullscreen({ navigationUI: 'hide' });
                } 
                // Fallback for older browsers and webkit implementations
                else if (elem.webkitRequestFullscreen) {
                    await elem.webkitRequestFullscreen();
                }
                // IE 11 and older Edge
                else if (elem.msRequestFullscreen) {
                    await elem.msRequestFullscreen();
                }
                // If we get here and nothing worked, that's okay - the app still functions
            } catch (error) {
                // Device might not support fullscreen, or user denied permission
                // The app is still fully functional in windowed mode
            }
        };

        const exitFullscreen = async () => {
            try {
                if (document.exitFullscreen) {
                    await document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    await document.webkitExitFullscreen();
                }
            } catch (error) {
                // Keep running in current mode if exit fails.
            }
        };

        const isFullscreenActive = () => {
            return !!(document.fullscreenElement || document.webkitFullscreenElement);
        };

        // Lock orientation and attempt fullscreen when the page loads
        window.addEventListener('load', () => {
            lockLandscapeOrientation();
            
            // On mobile devices, try fullscreen on a short delay to ensure DOM is ready
            if (isMobileDevice() && !isFileProtocol) {
                setTimeout(goFullscreen, 500);
            }

            const fsBtn = document.getElementById('btn-fullscreen');
            const fsStatus = document.getElementById('fullscreen-status');
            const syncFullscreenState = () => {
                const active = isFullscreenActive();
                fsBtn.textContent = active ? '📱 Exit Fullscreen' : '📱 Enter Fullscreen';
                fsStatus.textContent = isFileProtocol
                    ? 'Fullscreen: unavailable on file://'
                    : `Fullscreen: ${active ? 'on' : 'off'}`;
            };

            fsBtn.addEventListener('click', async () => {
                if (isFullscreenActive()) {
                    await exitFullscreen();
                } else {
                    await goFullscreen();
                }
                syncFullscreenState();
            });

            document.addEventListener('fullscreenchange', syncFullscreenState);
            document.addEventListener('webkitfullscreenchange', syncFullscreenState);
            syncFullscreenState();
        });

        // Also try fullscreen when user first touches the screen (more reliable on some devices)
        document.addEventListener('touchstart', () => {
            if (isMobileDevice() && !isFileProtocol) {
                goFullscreen();
            }
        }, { once: true });

        // And on first click as well (takes care of devices without touch)
        document.addEventListener('click', () => {
            if (isMobileDevice() && !isFileProtocol) {
                goFullscreen();
            }
        }, { once: true });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/objects.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/interactions.js"></script>
    <script>
        const physics = new PhysicsWorld();
        const renderer = new ThreeRenderer();
        const objectManager = new ObjectManager(physics, renderer);
        const ui = new UIController(physics, objectManager, renderer);
        const interactions = new InteractionSystem(objectManager, physics, renderer);

        const tray = document.getElementById('control-tray');
        const trayToggle = document.getElementById('btn-toggle-ui');
        trayToggle.addEventListener('click', () => {
            tray.classList.toggle('collapsed');
            const expanded = !tray.classList.contains('collapsed');
            trayToggle.textContent = expanded ? '❮' : '❯';
            trayToggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        });

        renderer.setZoomSensitivity(3);



        let isRunning = true;
        let isSlowMo = false;
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let lastFpsTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const deltaTime = Math.min((now - lastFrameTime) / 1000, 0.016);
            lastFrameTime = now;

            if (isRunning) {
                const step = isSlowMo ? deltaTime * 0.25 : deltaTime;
                physics.step(step);
                objectManager.updateMeshes();
            }

            renderer.render();

            frameCount++;
            if (now - lastFpsTime >= 1000) {
                ui.updateStats(frameCount, objectManager.getObjectCount(), physics.getBodyCount());
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        // UI Event Handlers
        document.getElementById('btn-play-pause').addEventListener('click', () => {
            isRunning = !isRunning;
            ui.updatePlayPauseButton(isRunning);
        });

        document.getElementById('btn-slow-motion').addEventListener('click', () => {
            isSlowMo = !isSlowMo;
            ui.updateSlowMoButton(isSlowMo);
        });

        document.getElementById('btn-clear-all').addEventListener('click', () => {
            objectManager.clearAll();
        });

        document.getElementById('input-gravity').addEventListener('change', (e) => {
            const gravity = parseFloat(e.target.value);
            physics.setGravity(gravity);
        });

        document.getElementById('input-friction').addEventListener('change', (e) => {
            const friction = parseFloat(e.target.value);
            physics.setFriction(friction);
        });

        document.getElementById('input-restitution').addEventListener('change', (e) => {
            const restitution = parseFloat(e.target.value);
            physics.setRestitution(restitution);
        });

        // Ground dimensions
        document.getElementById('input-ground-width').addEventListener('change', (e) => {
            const width = parseFloat(e.target.value);
            const height = parseFloat(document.getElementById('input-ground-height').value);
            renderer.updateGroundDimensions(width, height);
        });

        document.getElementById('input-ground-height').addEventListener('change', (e) => {
            const height = parseFloat(e.target.value);
            const width = parseFloat(document.getElementById('input-ground-width').value);
            renderer.updateGroundDimensions(width, height);
        });

        // Void threshold
        document.getElementById('input-void-threshold').addEventListener('change', (e) => {
            const threshold = parseFloat(e.target.value);
            objectManager.setVoidThreshold(threshold);
        });


        const nukeBtn = document.getElementById('btn-drop-nuke');
        nukeBtn.addEventListener('click', () => {
            const power = parseFloat(document.getElementById('input-nuke-power').value);
            const dropped = objectManager.dropNuke(power);
            if (!dropped) {
                const remaining = Math.ceil(objectManager.getNukeCooldownRemainingMs() / 1000);
                ui.notify(`Nuke cooling down: ${remaining}s`, 1200);
                return;
            }

            nukeBtn.disabled = true;
            nukeBtn.textContent = '☢ Cooling...';
            ui.notify('Nuke deployed', 1000);
            setTimeout(() => {
                nukeBtn.disabled = false;
                nukeBtn.textContent = '☢ Drop Nuke';
            }, objectManager.nukeCooldownMs);
        });

        document.getElementById('btn-toggle-destroy').addEventListener('click', () => {
            objectManager.toggleDestructionMode();
            ui.updateDestructionModeButton(objectManager.destructionMode);
        });

        document.getElementById('toggle-sound').addEventListener('change', (e) => {
            objectManager.setSoundEnabled(e.target.checked);
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                isRunning = !isRunning;
                ui.updatePlayPauseButton(isRunning);
            }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                isSlowMo = true;
                ui.updateSlowMoButton(true);
            }
            if (e.code === 'Delete') {
                objectManager.clearAll();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                isSlowMo = false;
                ui.updateSlowMoButton(false);
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            renderer.onWindowResize();
        });

        // Start animation loop
        animate();
    </script>
</body>
</html>
